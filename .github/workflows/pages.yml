# Publishes the static site to GitHub Pages (Actions source).
# For https://cheervinsky.github.io/ the repository must be named cheervinsky.github.io
# (Settings → General → Repository name on github.com).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build JS bundle
        run: chmod +x build.sh && ./build.sh

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html styles.css _site/
          cp -r build assets _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
